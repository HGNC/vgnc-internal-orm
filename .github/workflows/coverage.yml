name: Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,performance]"
        pip install coverage[toml]

    - name: Run unit tests with coverage
      run: |
        python -m pytest tests/unit/ \
          --cov=src/vgnc_internal_orm \
          --cov-report=xml:coverage-unit.xml \
          --cov-report=html:htmlcov-unit \
          --cov-report=term-missing \
          --cov-context=test \
          --cov-fail-under=70

    - name: Run integration tests with coverage
      run: |
        python -m pytest tests/integration/ \
          --cov=src/vgnc_internal_orm \
          --cov-append \
          --cov-report=xml:coverage-integration.xml \
          --cov-report=html:htmlcov-integration \
          --cov-report=term-missing \
          --cov-context=test \
          --cov-fail-under=60

    - name: Run performance tests with coverage
      run: |
        python -m pytest tests/performance/ \
          --cov=src/vgnc_internal_orm \
          --cov-append \
          --cov-report=xml:coverage-performance.xml \
          --cov-report=term-missing \
          --cov-context=test \
          --cov-fail-under=50

    - name: Combine coverage reports
      run: |
        python -m coverage combine
        python -m coverage xml -o coverage-combined.xml
        python -m coverage html -o htmlcov-combined
        python -m coverage json -o coverage-combined.json

    - name: Generate coverage summary
      run: |
        python .github/scripts/generate_coverage_summary.py > $GITHUB_STEP_SUMMARY

    - name: Check coverage thresholds
      run: |
        python .github/scripts/check_coverage_threshold.py

    - name: Upload coverage reports to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports-python${{ matrix.python-version }}
        path: |
          coverage-combined.xml
          htmlcov-combined/
          coverage-combined.json
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage-combined.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          // Read coverage data
          const coverageData = JSON.parse(fs.readFileSync('coverage-combined.json', 'utf8'));
          const totals = coverageData.totals;

          const coverage = totals.percent_covered;
          const linesCovered = totals.covered_lines;
          const linesTotal = totals.num_statements;
          const branchesCovered = totals.covered_branches || 0;
          const branchesTotal = totals.num_branches || 0;

          // Generate coverage comment
          const comment = `## 📊 Code Coverage Report

          **Overall Coverage:** ${coverage.toFixed(1)}%

          ### 📈 Coverage Details
          - **Lines:** ${linesCovered}/${linesTotal} (${coverage.toFixed(1)}%)
          - **Branches:** ${branchesCovered}/${branchesTotal} (${((branchesCovered/branchesTotal)*100).toFixed(1)}%)

          ### 📁 Module Coverage
          ${Object.entries(coverageData.files)
            .filter(([filename]) => filename.includes('src/vgnc_internal_orm'))
            .map(([filename, data]) => {
              const moduleName = filename.replace('src/vgnc_internal_orm/', '');
              const coverage = data.summary.percent_covered;
              const covered = data.summary.covered_lines;
              const total = data.summary.num_statements;
              return `- **${moduleName}**: ${coverage.toFixed(1)}% (${covered}/${total})`;
            })
            .join('\n')}

          ### 📋 Coverage Quality
          ${coverage >= 90 ? '🎉 Excellent coverage!' :
            coverage >= 80 ? '✅ Good coverage!' :
            coverage >= 70 ? '⚠️ Acceptable coverage' :
            '❌ Coverage needs improvement'}

          ---
          *Generated by GitHub Actions*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Coverage comparison job
  coverage-comparison:
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download coverage artifact
      uses: actions/download-artifact@v3
      with:
        name: coverage-reports-python3.13
        path: ./coverage-artifacts

    - name: Compare coverage with main branch
      run: |
        python .github/scripts/compare_coverage.py

  # Coverage badge generation
  coverage-badge:
    runs-on: ubuntu-latest
    needs: coverage
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download coverage artifact
      uses: actions/download-artifact@v3
      with:
        name: coverage-reports-python3.13
        path: ./coverage-artifacts

    - name: Generate coverage badge
      run: |
        pip install coverage-badge anybadge
        python .github/scripts/generate_coverage_badge.py

    - name: Upload coverage badge
      uses: actions/upload-artifact@v3
      with:
        name: coverage-badge
        path: coverage-badge.svg