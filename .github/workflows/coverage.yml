name: Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHONPATH: src

jobs:
  # Run all tests with coverage in a single job
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --extra test --extra performance

    - name: Run all tests with coverage
      env:
        UV_EXTRAS: --extra test --extra performance
      run: |
        # Initialize coverage data
        uv run $UV_EXTRAS python -m coverage erase

        # Run all test types with coverage
        uv run $UV_EXTRAS python -m pytest tests/ \
          --cov=src/vgnc_internal_orm \
          --cov-report=xml:coverage.xml \
          --cov-report=html:htmlcov \
          --cov-report=term-missing \
          --cov-context=test \
          --cov-fail-under=70

    - name: Generate coverage summary
      run: |
        uv run --extra test python .github/scripts/generate_coverage_summary.py > $GITHUB_STEP_SUMMARY

    - name: Check coverage thresholds
      run: |
        uv run --extra test python .github/scripts/check_coverage_threshold.py

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports-python${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/
          coverage.json
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          // Read coverage data
          const coverageData = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
          const totals = coverageData.totals;

          const coverage = totals.percent_covered;
          const linesCovered = totals.covered_lines;
          const linesTotal = totals.num_statements;
          const branchesCovered = totals.covered_branches || 0;
          const branchesTotal = totals.num_branches || 0;

          // Generate coverage comment
          const comment = \`## 📊 Code Coverage Report

          **Overall Coverage:** \${coverage.toFixed(1)}%

          ### 📈 Coverage Details
          - **Lines:** \${linesCovered}/${linesTotal} (\${coverage.toFixed(1)}%)
          - **Branches:** \${branchesCovered}/${branchesTotal} (\${((branchesCovered/branchesTotal)*100).toFixed(1)}%)

          ### 📁 Module Coverage
          \${Object.entries(coverageData.files)
            .filter(([filename]) => filename.includes('vgnc_internal_orm'))
            .map(([filename, data]) => {
              const moduleName = filename.replace('vgnc_internal_orm/', '');
              const coverage = data.summary.percent_covered;
              const covered = data.summary.covered_lines;
              const total = data.summary.num_statements;
              return \`- **\${moduleName}**: \${coverage.toFixed(1)}% (\${covered}/${total})\`;
            })
            .join('\\n')}

          ### 📋 Coverage Quality
          \${coverage >= 90 ? '🎉 Excellent coverage!' :
            coverage >= 80 ? '✅ Good coverage!' :
            coverage >= 70 ? '⚠️ Acceptable coverage' :
            '❌ Coverage needs improvement'}

          ---
          *Generated by GitHub Actions*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Coverage comparison job for PRs
  coverage-comparison:
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download coverage artifact
      uses: actions/download-artifact@v4
      with:
        name: coverage-reports-python3.13
        path: ./coverage-artifacts

    - name: Compare coverage with main branch
      run: |
        python .github/scripts/compare_coverage.py