name: Development Workflow

on:
  push:
    branches: [feature/*, bugfix/*, hotfix/*]
  pull_request:
    branches: [feature/*, bugfix/*]
  workflow_dispatch:
    inputs:
      skip_slow_tests:
        description: 'Skip slow tests (performance, load)'
        required: false
        default: false
        type: boolean
      run_quality_checks:
        description: 'Run code quality checks'
        required: false
        default: true
        type: boolean

env:
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Quick development tests
  dev-tests:
    name: Development Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-dev-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-dev-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Run unit tests (fast)
      run: |
        python -m pytest tests/unit/ \
          --tb=short \
          --maxfail=10 \
          --durations=5 \
          -x

    - name: Run integration tests (medium)
      run: |
        python -m pytest tests/integration/test_config_loading.py \
          tests/integration/test_mysql_integration_simple.py \
          --tb=short \
          -x

    - name: Upload development test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dev-test-results
        path: |
          htmlcov/
          coverage.xml
        retention-days: 3

  # Code quality checks (optional)
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    if: github.event.inputs.run_quality_checks != 'false'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install black isort flake8 mypy bandit

    - name: Check code formatting
      run: |
        echo "Checking code formatting..."
        black --check --diff src/ tests/ || echo "Formatting issues found"

    - name: Check import sorting
      run: |
        echo "Checking import sorting..."
        isort --check-only --diff src/ tests/ || echo "Import sorting issues found"

    - name: Run linting
      run: |
        echo "Running linting..."
        flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 || echo "Linting issues found"

    - name: Run security check
      run: |
        echo "Running security check..."
        bandit -r src/ -f json -o security-report.json || echo "Security issues found"

    - name: Upload quality reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quality-reports
        path: |
          security-report.json
        retention-days: 3

  # Performance tests (optional)
  perf-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_slow_tests != 'true'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,performance]"
        pip install pytest-benchmark

    - name: Run performance benchmarks
      run: |
        python -m pytest tests/performance/ \
          --benchmark-only \
          --benchmark-json=perf-results.json \
          --benchmark-min-rounds=2 \
          --benchmark-max-time=30

    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: perf-results
        path: perf-results.json
        retention-days: 3

  # Development feedback
  dev-feedback:
    name: Development Feedback
    runs-on: ubuntu-latest
    needs: [dev-tests]
    if: always() && github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v3
      with:
        name: dev-test-results
        path: dev-results/

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Generate development feedback
      run: |
        python .github/scripts/generate_dev_feedback.py > dev-feedback.md

    - name: Comment development feedback
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          if (fs.existsSync('dev-feedback.md')) {
            const feedback = fs.readFileSync('dev-feedback.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: feedback
            });
          }

    - name: Upload development feedback
      uses: actions/upload-artifact@v3
      with:
        name: dev-feedback
        path: dev-feedback.md
        retention-days: 7

  # Build validation
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Validate package
      run: |
        python -m pip install twine
        twine check dist/*

    - name: Test installation
      run: |
        python -m pip install dist/*.whl
        python -c "import vgnc_internal_orm; print('✅ Package installs successfully')"

  # Branch protection reminder
  branch-protection:
    name: Branch Protection Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Check branch protection
      run: |
        echo "## 🔒 Branch Protection Status"
        echo ""
        if [[ "${{ github.base_ref }}" == "main" ]]; then
          echo "✅ Target branch: main (protected)"
          echo "⚠️  Ensure all quality checks pass before merging"
          echo "⚠️  Maintain high test coverage"
        elif [[ "${{ github.base_ref }}" == "develop" ]]; then
          echo "✅ Target branch: develop (integration branch)"
          echo "✅ Ready for integration testing"
        else
          echo "ℹ️  Target branch: ${{ github.base_ref }} (feature branch)"
          echo "ℹ️  Ready for development testing"
        fi
        echo ""
        echo "### 📋 Merge Requirements"
        if [[ "${{ github.base_ref }}" == "main" ]]; then
          echo "- [ ] All tests pass (unit, integration, performance)")
          echo "- [ ] Code coverage ≥ 75%")
          echo "- [ ] No security vulnerabilities")
          echo "- [ ] Code formatted correctly")
          echo "- [ ] Package builds successfully")
        elif [[ "${{ github.base_ref }}" == "develop" ]]; then
          echo "- [ ] Unit and integration tests pass")
          echo "- [ ] Code coverage ≥ 70%")
          echo "- [ ] No critical security issues")
          echo "- [ ] Package builds successfully"
        else
          echo "- [ ] Unit tests pass")
          echo "- [ ] Basic integration tests pass")
          echo "- [ ] Package builds successfully"
        fi