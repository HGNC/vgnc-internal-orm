name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance
          - load
          - coverage
      python_version:
        description: 'Python version to test'
        required: false
        default: '3.13'
        type: choice
        options:
          - '3.13'

env:
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Test matrix across different Python versions
  test-matrix:
    name: Python ${{ matrix.python-version }} Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        include:
          - python-version: "3.13"
            test-type: "unit"
            cache-key: "unit"
          - python-version: "3.13"
            test-type: "integration"
            cache-key: "integration"
          - python-version: "3.13"
            test-type: "performance"
            cache-key: "performance"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.cache-key }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.cache-key }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,performance]"

    - name: Create test results directory
      run: |
        mkdir -p test-results

    - name: Run ${{ matrix.test-type }} tests
      run: |
        case "${{ matrix.test-type }}" in
          "unit")
            python -m pytest tests/unit/ \
              --junit-xml=test-results/unit-${{ matrix.python-version }}.xml \
              --cov=src/vgnc_internal_orm \
              --cov-report=xml:test-results/coverage-unit-${{ matrix.python-version }}.xml \
              --cov-report=html:test-results/coverage-html-unit-${{ matrix.python-version }} \
              --cov-report=term-missing \
              --cov-fail-under=70
            ;;
          "integration")
            python -m pytest tests/integration/ \
              --junit-xml=test-results/integration-${{ matrix.python-version }}.xml \
              --cov=src/vgnc_internal_orm \
              --cov-append \
              --cov-report=xml:test-results/coverage-integration-${{ matrix.python-version }}.xml \
              --cov-report=html:test-results/coverage-html-integration-${{ matrix.python-version }} \
              --cov-report=term-missing \
              --cov-fail-under=60
            ;;
          "performance")
            python -m pytest tests/performance/ \
              --junit-xml=test-results/performance-${{ matrix.python-version }}.xml \
              --benchmark-only \
              --benchmark-json=test-results/benchmark-${{ matrix.python-version }}.json \
              --benchmark-html=test-results/benchmark-${{ matrix.python-version }}.html
            ;;
        esac

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.test-type }}
        path: |
          test-results/
        retention-days: 7

  # Unit tests (fast feedback)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-unit-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ \
          --verbose \
          --tb=short \
          --durations=10 \
          --maxfail=5 \
          --junit-xml=test-results/unit.xml

    - name: Upload unit test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results-${{ matrix.python-version }}
        path: test-results/unit.xml
        retention-days: 7

  # Integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-integration-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,mysql]"
        pip install testcontainers[mysql]

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ \
          --verbose \
          --tb=short \
          --durations=10 \
          --maxfail=5 \
          --junit-xml=test-results/integration.xml

    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results-${{ matrix.python-version }}
        path: test-results/integration.xml
        retention-days: 7

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-performance-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,performance]"
        pip install pytest-benchmark

    - name: Create test results directory
      run: mkdir -p test-results

    - name: Run performance benchmarks
      run: |
        python -m pytest tests/performance/ \
          --benchmark-only \
          --benchmark-json=test-results/benchmark.json \
          --benchmark-html=test-results/benchmark.html \
          --benchmark-histogram=test-results/benchmark-histogram \
          --benchmark-save=baseline

    - name: Run performance regression checks
      run: |
        python -m pytest tests/performance/ \
          --benchmark-only \
          --benchmark-compare=baseline \
          --benchmark-compare-fail=20%

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-test-results
        path: |
          test-results/benchmark.json
          test-results/benchmark.html
          test-results/benchmark-histogram
        retention-days: 7

  # Load tests
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: performance-tests
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-load-tests')
    strategy:
      matrix:
        test-scenario:
          - name: "light-load"
            users: 5
            duration: 30
          - name: "medium-load"
            users: 20
            duration: 60
          - name: "heavy-load"
            users: 50
            duration: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-load-${{ hashFiles('**/pyproject.toml') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"

    - name: Create test results directory
      run: mkdir -p test-results

    - name: Run load test - ${{ matrix.test-scenario.name }}
      run: |
        python simple_load_test.py \
          --test lookup \
          --users ${{ matrix.test-scenario.users }} \
          --duration ${{ matrix.test-scenario.duration }} \
          --output test-results/load-test-${{ matrix.test-scenario.name }}.json

    - name: Upload load test results
      uses: actions/upload-artifact@v4
      with:
        name: load-test-results-${{ matrix.test-scenario.name }}
        path: test-results/load-test-${{ matrix.test-scenario.name }}.json
        retention-days: 7

  # Security and quality checks
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Create test results directory
      run: mkdir -p test-results

    - name: Run code quality checks
      run: |
        # Format check
        black --check --diff src/ tests/

        # Import sorting and linting check
        ruff check src/ tests/

        # Type checking
        mypy src/ --ignore-missing-imports || true

    - name: Run security checks
      run: |
        # Check for security vulnerabilities
        bandit -r src/ -f json -o test-results/security-report.json || true

        # Check dependencies for vulnerabilities
        pip-audit --output-format=json --output-file=test-results/dependency-audit.json || true

    - name: Upload quality check results
      uses: actions/upload-artifact@v4
      with:
        name: quality-check-results
        path: test-results/
        retention-days: 7

  # Build and package validation
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Build package
      run: |
        python -m pip install --upgrade pip build twine
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Install package
      run: |
        python -m pip install dist/*.whl

    - name: Validate installation
      run: |
        python -c "import vgnc_internal_orm; print('Package installed successfully')"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.python-version }}
        path: dist/
        retention-days: 7

  # Test results summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests]
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: all-test-results/

    - name: Generate test summary
      run: |
        python .github/scripts/generate_test_summary.py > test-summary.md

    - name: Comment test summary on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          if (fs.existsSync('test-summary.md')) {
            const summary = fs.readFileSync('test-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
          }

    - name: Upload test summary
      uses: actions/upload-artifact@v4
      with:
        name: test-summary
        path: test-summary.md
        retention-days: 30

  # Notification job
  notifications:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Notify on success
      if: needs.test-summary.result == 'success'
      run: |
        echo "✅ CI pipeline completed successfully!"
        # Add Slack/Teams notification here if needed

    - name: Notify on failure
      if: needs.test-summary.result == 'failure'
      run: |
        echo "❌ CI pipeline failed!"
        # Add Slack/Teams notification here if needed