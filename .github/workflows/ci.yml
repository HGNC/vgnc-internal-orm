name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance

env:
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Full test suite - runs all tests in parallel
  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: ["unit", "integration", "performance"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        # Base dependencies including test group
        uv sync --group test

        # Install performance deps only for performance tests
        if [ "${{ matrix.test-type }}" = "performance" ]; then
          uv sync --group performance
        fi

        # Install MySQL deps for integration tests
        if [ "${{ matrix.test-type }}" = "integration" ]; then
          uv sync --extra mysql
        fi

        # Install the package in editable mode
        uv pip install -e .

    - name: Run ${{ matrix.test-type }} tests
      run: |
        python -m pytest tests/${{ matrix.test-type }}/ \
          --junit-xml=test-results/${{ matrix.test-type }}.xml \
          --cov=src/vgnc_internal_orm \
          --cov-report=xml:test-results/coverage-${{ matrix.test-type }}.xml \
          --cov-report=html:test-results/coverage-html-${{ matrix.test-type }} \
          --cov-report=term-missing \
          --cov-fail-under=70

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-type }}
        path: test-results/
        retention-days: 7

  # Quick smoke tests for PRs - faster feedback
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --group test
        uv pip install -e .

    - name: Run smoke tests
      run: |
        python -m pytest tests/unit/test_unit_framework.py tests/unit/test_config.py \
          tests/integration/test_db_common_smoke.py \
          -v --tb=short --maxfail=5

  # Code quality checks
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --group dev
        uv pip install -e .

    - name: Run code quality checks
      run: |
        # Format check
        black --check --diff src/ tests/

        # Import sorting and linting
        ruff check src/ tests/

        # Type checking
        mypy src/ --ignore-missing-imports || true

        # Security check
        bandit -r src/ -f json -o test-results/security-report.json || true

    - name: Upload quality check results
      uses: actions/upload-artifact@v4
      with:
        name: quality-check-results
        path: test-results/
        retention-days: 7

  # Build and package validation
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Install and validate package
      run: |
        python -m pip install dist/*.whl
        python -c "import vgnc_internal_orm; print('✅ Package installed successfully')"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7

  # Test summary and PR comment
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test-suite
    if: always() && github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download test results
      uses: actions/download-artifact@v4
      with:
        path: test-results/

    - name: Generate test summary
      run: |
        python .github/scripts/generate_test_summary.py > test-summary.md

    - name: Comment test summary on PR
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          if (fs.existsSync('test-summary.md')) {
            const summary = fs.readFileSync('test-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
          }

    - name: Upload test summary
      uses: actions/upload-artifact@v4
      with:
        name: test-summary
        path: test-summary.md
        retention-days: 30

  # Notification job
  notifications:
    name: Notifications
    runs-on: ubuntu-latest
    needs: test-summary
    if: always()

    steps:
    - name: Notify on success
      if: needs.test-summary.result == 'success'
      run: |
        echo "✅ CI pipeline completed successfully!"

    - name: Notify on failure
      if: needs.test-summary.result == 'failure'
      run: |
        echo "❌ CI pipeline failed!"
        echo "Please review the test results in the PR comments."